# One-time cleanup: hard-reset `next` to match `main`.
#
# Run this once after merging the release.config.js change so the existing
# divergence between next (1.55.0-rc.11) and main (1.55.0) is wiped.
# After the reset, dev → next → main flow resumes cleanly because `next`
# no longer commits release artifacts.

name: Reset next to main (manual)

on:
  workflow_dispatch:

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_GITHUB }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Reset next to main
        run: |
          git fetch origin
          git checkout next
          git reset --hard origin/main
          git push origin next --force-with-lease
